class ChatLine{constructor(msg){this.message=msg;this.counter=0;}}
let chatMessages=[];
function processCommand(msg){
 let parts=msg.trim().split(/\s+/),cmd=parts[0].toLowerCase();
 if(cmd==='/tp'||cmd==='/teleport'){
  if(parts.length>=2){
   let target=null;
   for(let e of level.entities)if(e instanceof NetworkPlayer&&e.playerName&&e.playerName.toLowerCase()===parts[1].toLowerCase()){target=e;break;}
   if(target){player.moveTo(target.x,target.y,target.z,player.yRot,player.xRot);addChatMessage('&7Teleported to '+parts[1]);}
   else addChatMessage('&cPlayer not found: '+parts[1]);
  }else addChatMessage('&cUsage: /tp <player>');
  return true;
 }
 if(cmd==='/solid'){
  window.placeUnbreakable=!window.placeUnbreakable;
  if(window.placeUnbreakable)addChatMessage('&eNow placing unbreakable stone');
  else addChatMessage('&eNow placing normal stone');
  return true;
 }
 return false;
}

  let oldKeys = {};
  setInterval(function() {
    if (gamepadIndex < 0 || paused || currentScreen) return;
    let gp = null;
    try { let gps = navigator.getGamepads(); if (gps) gp = gps[gamepadIndex]; } catch(e) {}
    if (!gp) return;
    let axisX = gp.axes[0] || 0, axisY = gp.axes[1] || 0;
    if (Math.abs(axisX) > 0.15 || Math.abs(axisY) > 0.15) {
      player.turn(axisX * 8, axisY * -8);
    }
    let buttons = { jump: gp.buttons[0] && gp.buttons[0].pressed, build: gp.buttons[2] && gp.buttons[2].pressed, break: gp.buttons[3] && gp.buttons[3].pressed, itemPrev: gp.buttons[4] && gp.buttons[4].pressed, itemNext: gp.buttons[5] && gp.buttons[5].pressed };
    if (buttons.jump && !oldKeys.jump) { keys[32] = true; if (player) player.setKey(32, true); }
    else if (!buttons.jump && oldKeys.jump) { keys[32] = false; if (player) player.setKey(32, false); }
    if (buttons.build && !oldKeys.build) { editMode = 1; handleMouseClick(); }
    if (buttons.break && !oldKeys.break) { editMode = 0; handleMouseClick(); }
    if (buttons.itemPrev && !oldKeys.itemPrev) { let idx = player.inventory.selectedSlot - 1; if (idx < 0) idx = 8; player.inventory.selectedSlot = idx; paintTexture = player.inventory.getSelected(); paintIdx = creativeTiles.indexOf(paintTexture); }
    if (buttons.itemNext && !oldKeys.itemNext) { let idx = player.inventory.selectedSlot + 1; if (idx > 8) idx = 0; player.inventory.selectedSlot = idx; paintTexture = player.inventory.getSelected(); paintIdx = creativeTiles.indexOf(paintTexture); }
    oldKeys = { jump: buttons.jump, build: buttons.build, break: buttons.break, itemPrev: buttons.itemPrev, itemNext: buttons.itemNext };
  }, 50);
}

if (typeof navigator.getGamepads === 'function') {
  if (document.readyState === 'complete') initGamepadSupport();
  else window.addEventListener('load', initGamepadSupport);
}
